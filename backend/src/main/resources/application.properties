# ===============================
# PrepPilot AI - Backend Config
# ===============================
# All secrets/config come from environment variables (see backend/.env.example).
# Never hardcode real credentials here.

spring.application.name=preppilot-backend
server.port=${SERVER_PORT:8080}

# ---- Database (MySQL) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/preppilot?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- JWT ----
# jwt.secret must be at least 32 characters (256 bits) for HS256.
jwt.secret=${JWT_SECRET:change-this-in-your-env-file-please-32chars-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- IBM Granite AI (used in later features) ----
granite.api.url=${GRANITE_API_URL:}
granite.api.key=${GRANITE_API_KEY:}

# ---- CORS (frontend origin) ----
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# ---- File upload (used by resume upload feature) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
